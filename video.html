<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- Flowbite -->
<script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<body>
    <nav x-data="{ isOpen: false }"
        class="relative overflow-hidden rounded-xl border border-blue-500/20 sticky top-0 z-50">
        <!-- Animated Background -->
        <div class="absolute inset-0 bg-gradient-to-r from-green-950 via-green-900 to-green-950 backdrop-blur-md"></div>

        <!-- Floating Bubbles -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute h-4 w-4 rounded-full bg-blue-400/10 animate-float top-4 left-[10%]"></div>
            <div
                class="absolute h-3 w-3 rounded-full bg-blue-400/10 animate-float top-8 left-[20%] [animation-delay:0.5s]">
            </div>
            <div
                class="absolute h-5 w-5 rounded-full bg-blue-400/10 animate-float top-6 left-[80%] [animation-delay:1s]">
            </div>
            <div
                class="absolute h-6 w-6 rounded-full bg-blue-400/10 animate-float top-2 left-[60%] [animation-delay:1.5s]">
            </div>
        </div>

        <!-- Main Navbar Content -->
        <div class="relative px-4 sm:px-8 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <div class="flex items-center space-x-3 group">
                    <div class="relative">
                        <div
                            class="absolute inset-0 bg-gradient-to-r from-blue-500 to-cyan-400 rounded-lg blur group-hover:blur-md transition-all duration-300">
                        </div>

                        <div><img
                                class="relative w-8 sm:w-10 h-8 sm:h-10 text-white transform group-hover:scale-110 transition-transform duration-300"
                                src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Ben_10_reboot_logo.png" alt="">
                        </div>
                    </div>
                    <span class="text-xl sm:text-2xl font-bold text-white">ben10</span>
                </div>

                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center space-x-10">
                    <a href="../html/indext.html" class="relative group">
                        <span class="text-blue-100 group-hover:text-white transition-colors duration-300">Home</span>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gradient-to-r from-blue-500 to-cyan-400 group-hover:w-full transition-all duration-300">
                        </div>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-white/20 group-hover:w-full transition-all duration-500 delay-100">
                        </div>
                    </a>
                    <a href="./video.html" class="relative group">
                        <span
                            class="text-blue-100 group-hover:text-white transition-colors duration-300">video</span>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gradient-to-r from-blue-500 to-cyan-400 group-hover:w-full transition-all duration-300">
                        </div>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-white/20 group-hover:w-full transition-all duration-500 delay-100">
                        </div>
                    </a>
                    <a href="#" class="relative group">
                        <span class="text-blue-100 group-hover:text-white transition-colors duration-300">About</span>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gradient-to-r from-blue-500 to-cyan-400 group-hover:w-full transition-all duration-300">
                        </div>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-white/20 group-hover:w-full transition-all duration-500 delay-100">
                        </div>
                    </a>
                    <a href="#" class="relative group">
                        <span class="text-blue-100 group-hover:text-white transition-colors duration-300">Contact</span>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gradient-to-r from-blue-500 to-cyan-400 group-hover:w-full transition-all duration-300">
                        </div>
                        <div
                            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-white/20 group-hover:w-full transition-all duration-500 delay-100">
                        </div>

                    </a>
                    <div>


                    </div>
                    <button class="buttonToggle text-white text-xl">
                        <i class="fa-solid fa-moon iconChange"></i>
                    </button>

                </div>

                <!-- Mobile Menu Button -->
                <button @click="isOpen = !isOpen" class="md:hidden relative group" aria-label="Toggle mobile menu">
                    <div
                        class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-cyan-400 rounded blur opacity-60 group-hover:opacity-100 transition duration-200">
                    </div>
                    <div class="relative p-2 bg-blue-950 rounded leading-none">
                        <svg x-show="!isOpen" class="w-6 h-6 text-blue-200 group-hover:text-white" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                        <svg x-show="isOpen" class="w-6 h-6 text-blue-200 group-hover:text-white" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </div>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Dropdown -->
        <div x-show="isOpen" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-2" class="relative mt-4 md:hidden">
            <div class="px-2 pt-2 pb-3 space-y-1 bg-blue-900/50 backdrop-blur-sm rounded-lg border border-blue-500/10">
                <a href="#"
                    class="block px-3 py-2 rounded-md text-base font-medium text-blue-100 hover:text-white hover:bg-blue-800/50 transition-all duration-200">Home</a>
                <a href="#"
                    class="block px-3 py-2 rounded-md text-base font-medium text-blue-100 hover:text-white hover:bg-blue-800/50 transition-all duration-200">Features</a>
                <a href="#"
                    class="block px-3 py-2 rounded-md text-base font-medium text-blue-100 hover:text-white hover:bg-blue-800/50 transition-all duration-200">About</a>
                <a href="#"
                    class="block px-3 py-2 rounded-md text-base font-medium text-blue-100 hover:text-white hover:bg-blue-800/50 transition-all duration-200">Contact</a>
                <!-- Mobile CTA Button -->
            </div>
        </div>
        </div>
    </nav>
     <div>
            <h1 class="text-blue-500 text-center font-bold">video</h1>
        </div>
    <div class="container mt-6 gap-10 mx-auto grid grid-cols-1 sm:grid-cols-2 p-4 justify-center py-10">
       
        <video controls autoplay muted class="w-96 h-96 max-w-4xl rounded-2xl shadow-2xl">
            <source src="../video/team.MOV" type="video/mp4">
        </video>
        <video controls autoplay muted class="w-96 h-96 max-w-4xl mt-5 rounded-2xl shadow-2xl">
            <source src="../video/video.MOV" type="video/mp4">
        </video>
    </div>
    <!-- fonasome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>

</html>
